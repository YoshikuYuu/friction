<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friction</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <header class="popup-header">
        <span class="popup-title">Friction</span>
        <button class="popup-close" id="closeBtn" title="Close">&times;</button>
      </header>

      <div class="popup-body">
        <p class="popup-status" id="status">Loading...</p>
        <button class="popup-btn" id="actionBtn">Run</button>
      </div>

      <footer class="popup-footer">
        <span id="pageInfo">—</span>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
